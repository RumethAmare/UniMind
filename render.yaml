services:
  - type: web
    name: unimind-backend
    runtime: docker
    plan: starter
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    preDeployCommand: alembic upgrade head
    healthCheckPath: /api/v1/ready
    disk:
      name: unimind-uploads
      mountPath: /data/uploads
      sizeGB: 1
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        value: https://unimind-frontend.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: unimind-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: QDRANT_URL
        value: http://unimind-qdrant:6333
      - key: QDRANT_COLLECTION
        value: unimind_chunks
      - key: EMBEDDING_PROVIDER
        value: openai
      - key: EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: EMBEDDING_DIMENSION
        value: 768
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RAG_TOP_K
        value: 5
      - key: RAG_MIN_SCORE
        value: 0.2
      - key: RAG_MAX_CONTEXT_CHARS
        value: 12000
      - key: RATE_LIMIT_AUTH
        value: 10/minute
      - key: RATE_LIMIT_AI
        value: 30/minute

  - type: web
    name: unimind-frontend
    runtime: docker
    plan: starter
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://unimind-backend.onrender.com/api/v1

  - type: pserv
    name: unimind-qdrant
    runtime: image
    plan: starter
    image:
      url: docker.io/qdrant/qdrant:v1.9.7
    disk:
      name: unimind-qdrant-data
      mountPath: /qdrant/storage
      sizeGB: 1

databases:
  - name: unimind-postgres
    plan: starter
    databaseName: unimind
    user: unimind
